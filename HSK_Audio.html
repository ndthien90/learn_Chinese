<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Audio Pro Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Custom Scrollbar cho danh sách nhạc */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Custom Timeline Slider */
        .progress-slider {
            -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0;
            border-radius: 5px; outline: none; cursor: pointer; transition: background 450ms ease-in;
        }
        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #3b82f6; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.2); transition: transform 0.1s; opacity: 0;
        }
        .progress-slider:hover::-webkit-slider-thumb { opacity: 1; transform: scale(1.2); }
        
        /* Hiệu ứng Track đang phát */
        .playing-track { background-color: #eff6ff; border-left: 4px solid #3b82f6; }
        .playing-track .track-num { display: none; }
        .playing-track .track-eq { display: flex; }
        
        /* Equalizer Animation (3 thanh nhấp nhô) */
        .track-eq { display: none; align-items: flex-end; gap: 2px; height: 16px; }
        .eq-bar { width: 3px; background-color: #3b82f6; animation: eq-bounce 1s infinite ease-in-out; border-radius: 2px;}
        .eq-bar:nth-child(1) { animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { animation-delay: 0.0s; }
        @keyframes eq-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        
        /* Tạm dừng hiệu ứng khi pause */
        .is-paused .eq-bar { animation-play-state: paused; height: 4px; }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- HEADER / NAVIGATION -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between z-10 shadow-sm flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-headphones-simple text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">HSK Audio</h1>
            </div>
        </div>

        <!-- Bộ chọn Đề -->
        <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-lg border border-gray-200">
            <label for="deSelector" class="text-sm font-medium text-gray-600 ml-2 hidden sm:block"><i class="fa-solid fa-book-open text-blue-500 mr-2"></i>Chọn tài liệu:</label>
            <select id="deSelector" class="bg-white border border-gray-300 text-gray-800 text-sm rounded-md focus:ring-blue-500 focus:border-blue-500 block px-4 py-2 outline-none shadow-sm cursor-pointer font-medium">
                <!-- Javascript sẽ render 10 đề vào đây -->
            </select>
        </div>
    </header>

    <!-- MAIN CONTENT (Track List) -->
    <main class="flex-1 overflow-y-auto custom-scrollbar bg-[#f8fafc] relative" id="mainScrollArea">
        <div class="max-w-4xl mx-auto px-4 py-8 pb-32">
            
            <!-- Banner / Header của Đề -->
            <div class="flex flex-col md:flex-row items-end gap-6 mb-8 px-4">
                <div class="flex-1 w-full text-center md:text-left">
                    <span class="text-xs font-bold tracking-wider text-blue-600 uppercase">Danh sách bài nghe</span>
                    <h2 id="albumTitle" class="text-4xl md:text-5xl font-black text-gray-900 mt-2 mb-4">Đề số 1</h2>
                                   </div>
            </div>

            <!-- List Header -->
            <div class="grid grid-cols-[50px_1fr_80px_60px] gap-4 px-6 py-3 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wider sticky top-0 bg-[#f8fafc]/90 backdrop-blur z-10">
                <div class="text-center">#</div>
                <div>Tên tệp</div>
                <div class="text-center"><i class="fa-regular fa-clock"></i></div>
                <div class="text-center">TT</div>
            </div>

            <!-- Track List Container -->
            <div id="trackList" class="flex flex-col mt-2">
                <!-- Tracks rendered by JS -->
            </div>

        </div>
    </main>

    <!-- BOTTOM FIXED PLAYER -->
    <footer class="fixed bottom-0 left-0 right-0 glass-panel border-t border-gray-200 px-4 md:px-8 py-3 flex flex-col md:flex-row items-center justify-between z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] h-auto md:h-24 gap-4 md:gap-0">
        
        <!-- Info (Left) -->
        <div class="flex items-center gap-4 w-full md:w-1/3 min-w-0">
            <div id="nowPlayingIcon" class="w-12 h-12 rounded bg-gray-100 flex items-center justify-center flex-shrink-0 transition-colors">
                <i class="fa-solid fa-music text-gray-400"></i>
            </div>
            <div class="min-w-0 overflow-hidden">
                <h4 id="nowPlayingTitle" class="font-bold text-gray-800 text-sm truncate">Chưa chọn bài</h4>
                <p id="nowPlayingAlbum" class="text-xs text-gray-500 truncate">Vui lòng chọn Đề và bấm Phát</p>
            </div>
        </div>

        <!-- Controls (Center) -->
        <div class="flex flex-col items-center w-full md:w-1/3 max-w-xl px-4">
            <!-- Buttons -->
            <div class="flex items-center gap-6 mb-2">
                <button id="btnSpeed" class="text-xs font-bold text-gray-500 hover:text-blue-600 transition w-8 focus:outline-none" title="Tốc độ phát">1.0x</button>
                <button id="btnPrev" class="text-gray-600 hover:text-blue-600 transition text-lg focus:outline-none"><i class="fa-solid fa-backward-step"></i></button>
                <button id="btnPlay" class="w-10 h-10 flex items-center justify-center bg-gray-900 text-white rounded-full hover:bg-blue-600 hover:scale-105 transition-all shadow-md focus:outline-none">
                    <i id="iconPlay" class="fa-solid fa-play ml-1"></i>
                </button>
                <button id="btnNext" class="text-gray-600 hover:text-blue-600 transition text-lg focus:outline-none"><i class="fa-solid fa-forward-step"></i></button>
                <button id="btnRepeat" class="text-gray-400 hover:text-blue-600 transition text-sm focus:outline-none" title="Lặp lại danh sách"><i class="fa-solid fa-repeat"></i></button>
            </div>
            
            <!-- Progress Bar -->
            <div class="w-full flex items-center gap-3">
                <span id="timeCurrent" class="text-[11px] font-mono text-gray-500 w-10 text-right">0:00</span>
                <input type="range" id="progressBar" class="progress-slider" min="0" max="100" value="0">
                <span id="timeTotal" class="text-[11px] font-mono text-gray-500 w-10">0:00</span>
            </div>
        </div>

        <!-- Volume (Right) -->
        <div class="hidden md:flex items-center justify-end gap-3 w-1/3">
            <i class="fa-solid fa-volume-low text-gray-500 text-sm"></i>
            <input type="range" id="volumeBar" class="progress-slider w-24" min="0" max="1" step="0.01" value="1">
            <button id="btnFullscreen" class="ml-4 text-gray-500 hover:text-gray-800 transition focus:outline-none"><i class="fa-solid fa-expand"></i></button>
        </div>
    </footer>

    <!-- Audio Element (Hidden) -->
    <audio id="audioPlayer"></audio>

    <script>
        // === CONFIGURATION ===
        const MAX_DE = 10; // Hỗ trợ hiển thị tối đa 20 đề trong dropdown
        const TRACKS_PER_DE = 45; // Số file mỗi đề (001 -> 045)
        
        // === STATE ===
        let currentDe = 1;
        let currentTrackIndex = -1; // Index trong mảng tracks (0 -> 44)
        let isPlaying = false;
        let isRepeatOne = false;
        let currentSpeed = 1.0;
        let tracks = []; // Danh sách track của Đề hiện tại
        let isDraggingProgress = false;

        // === DOM ELEMENTS ===
        const deSelector = document.getElementById('deSelector');
        const albumTitle = document.getElementById('albumTitle');
        const trackCountDisplay = document.getElementById('trackCountDisplay');
        const trackListContainer = document.getElementById('trackList');
        const mainScrollArea = document.getElementById('mainScrollArea');

        // Player UI
        const audioPlayer = document.getElementById('audioPlayer');
        const btnPlay = document.getElementById('btnPlay');
        const iconPlay = document.getElementById('iconPlay');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnRepeat = document.getElementById('btnRepeat');
        const btnSpeed = document.getElementById('btnSpeed');
        const progressBar = document.getElementById('progressBar');
        const volumeBar = document.getElementById('volumeBar');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeTotal = document.getElementById('timeTotal');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingAlbum = document.getElementById('nowPlayingAlbum');
        const nowPlayingIcon = document.getElementById('nowPlayingIcon');
        const btnFullscreen = document.getElementById('btnFullscreen');

        // === INITIALIZATION ===
        function init() {
            // 1. Populate Dropdown
            for (let i = 1; i <= MAX_DE; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Đề số ${i}`;
                deSelector.appendChild(option);
            }

            // 2. Load Đề 1 default
            loadDe(currentDe);

            // 3. Set volume ban đầu
            updateSliderBackground(volumeBar, volumeBar.value * 100);
        }

        // Hàm format số (VD: 1 -> "001")
        function padNum(num) {
            return String(num).padStart(3, '0');
        }

        // Hàm format thời gian (giây -> m:ss)
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // === LOGIC TẠO & HIỂN THỊ DANH SÁCH BÀI ===
        function loadDe(deNumber) {
            currentDe = parseInt(deNumber);
            albumTitle.textContent = `Đề số ${currentDe}`;
            
            // Dừng nhạc và reset trạng thái player khi chuyển đề
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            isPlaying = false;
            currentTrackIndex = -1;
            
            // Xóa track cũ
            trackListContainer.innerHTML = '';
            tracks = [];

            // Tạo danh sách track
            for (let i = 1; i <= TRACKS_PER_DE; i++) {
                const trackNumStr = padNum(i);
                const fileName = `De${currentDe}_${trackNumStr}.mp3`;
                const filePath = `data_HSKAudio/De${currentDe}_mp3/${fileName}`;
                
                tracks.push({
                    index: i - 1,
                    num: i,
                    fileName: fileName,
                    path: filePath,
                    duration: '--:--', // Mặc định vì chưa load được file
                    status: 'ready'
                });
            }

            renderTrackList();
            
            // Reset toàn bộ giao diện player dưới đáy về trạng thái mặc định
            nowPlayingAlbum.textContent = `Danh sách: Đề số ${currentDe}`;
            nowPlayingTitle.textContent = "Chưa chọn bài";
            nowPlayingIcon.classList.remove('bg-blue-100');
            nowPlayingIcon.innerHTML = `<i class="fa-solid fa-music text-gray-400"></i>`;
            timeCurrent.textContent = "0:00";
            timeTotal.textContent = "0:00";
            progressBar.value = 0;
            updateSliderBackground(progressBar, 0);
            updatePlayerUI();
        }

        function renderTrackList() {
            trackListContainer.innerHTML = '';
            
            tracks.forEach(track => {
                const row = document.createElement('div');
                row.id = `trackRow_${track.index}`;
                
                const isCurrentTrack = track.index === currentTrackIndex;
                let rowClasses = "grid grid-cols-[50px_1fr_80px_60px] gap-4 px-6 py-3 items-center border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors group rounded-lg mx-2 my-0.5";
                
                if (isCurrentTrack) {
                    rowClasses += " playing-track";
                    if (!isPlaying) rowClasses += " is-paused";
                }

                row.className = rowClasses;
                row.onclick = () => playTrack(track.index);

                row.innerHTML = `
                    <div class="text-center font-medium text-gray-400">
                        <span class="track-num group-hover:hidden ${isCurrentTrack ? 'hidden' : 'block'}">${track.num}</span>
                        <div class="track-eq justify-center group-hover:hidden w-full ${isCurrentTrack ? 'flex' : 'hidden'}">
                            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        </div>
                        <i class="fa-solid fa-play text-blue-500 hidden group-hover:block ${isCurrentTrack ? 'text-blue-600' : ''}"></i>
                    </div>
                    <div>
                        <div class="font-medium ${isCurrentTrack ? 'text-blue-700' : 'text-gray-800'}">${track.fileName}</div>
                    </div>
                    <div class="text-center text-sm font-mono text-gray-500 track-time" id="timeDisplay_${track.index}">${track.duration}</div>
                    <div class="text-center" id="statusIcon_${track.index}">
                        ${track.status === 'error' ? '<i class="fa-solid fa-triangle-exclamation text-red-400" title="File không tồn tại"></i>' : '<i class="fa-regular fa-circle-check text-green-400 opacity-0 group-hover:opacity-100 transition-opacity"></i>'}
                    </div>
                `;
                trackListContainer.appendChild(row);
            });
        }

        // === LOGIC PHÁT NHẠC ===
        function playTrack(index) {
            if (index < 0 || index >= tracks.length) return;

            const isSameTrack = currentTrackIndex === index;

            if (isSameTrack) {
                // Click lại bài đang phát -> Toggle Play/Pause
                togglePlay();
                return;
            }

            // Bài mới
            currentTrackIndex = index;
            const track = tracks[currentTrackIndex];
            
            // Cập nhật thẻ audio
            audioPlayer.src = track.path;
            audioPlayer.playbackRate = currentSpeed; // Giữ nguyên tốc độ đã chọn
            
            // Xử lý phát
            audioPlayer.play().then(() => {
                isPlaying = true;
                track.status = 'playing';
                updatePlayerUI();
                renderTrackList(); // Cập nhật lại màu sắc danh sách
                scrollToPlayingTrack();
                updateMediaSession();
            }).catch(error => {
                console.error("Lỗi phát audio (File không tồn tại hoặc lỗi trình duyệt):", error);
                // Đánh dấu lỗi và tự động nhảy bài
                tracks[currentTrackIndex].status = 'error';
                document.getElementById(`statusIcon_${currentTrackIndex}`).innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500" title="Lỗi/Không tìm thấy"></i>';
                
                // Đợi 1.5s rồi tự động Next để người dùng kịp nhìn thấy lỗi
                setTimeout(() => {
                    playNext();
                }, 1500);
            });

            updatePlayerUI();
            renderTrackList();
        }

        function togglePlay() {
            if (currentTrackIndex === -1) {
                // Nếu chưa chọn bài nào, phát bài đầu tiên
                playTrack(0);
                return;
            }

            if (audioPlayer.paused) {
                audioPlayer.play().then(() => {
                    isPlaying = true;
                    updatePlayerUI();
                    renderTrackList();
                }).catch(err => console.error(err));
            } else {
                audioPlayer.pause();
                isPlaying = false;
                updatePlayerUI();
                renderTrackList();
            }
        }

        function playNext() {
            let nextIdx = currentTrackIndex + 1;
            if (nextIdx >= tracks.length) nextIdx = 0; // Quay lại bài 1 nếu hết list
            playTrack(nextIdx);
        }

        function playPrev() {
            // Nếu bài đang phát > 3s thì lùi lại từ đầu bài hiện tại
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
                return;
            }
            let prevIdx = currentTrackIndex - 1;
            if (prevIdx < 0) prevIdx = tracks.length - 1;
            playTrack(prevIdx);
        }

        function scrollToPlayingTrack() {
            if (currentTrackIndex === -1) return;
            const row = document.getElementById(`trackRow_${currentTrackIndex}`);
            if (row) {
                // Cuộn mượt mà đến phần tử đó
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function updatePlayerUI() {
            if (currentTrackIndex !== -1) {
                const track = tracks[currentTrackIndex];
                nowPlayingTitle.textContent = track.fileName;
                nowPlayingAlbum.textContent = `Đề số ${currentDe}`;
                nowPlayingIcon.classList.add('bg-blue-100');
                nowPlayingIcon.innerHTML = `<i class="fa-solid fa-compact-disc ${isPlaying ? 'fa-spin-pulse text-blue-500' : 'text-gray-400'}"></i>`;
            }

            if (isPlaying) {
                iconPlay.classList.remove('fa-play', 'ml-1');
                iconPlay.classList.add('fa-pause');
            } else {
                iconPlay.classList.remove('fa-pause');
                iconPlay.classList.add('fa-play', 'ml-1');
            }
        }

        // Cập nhật màu nền slider progress
        function updateSliderBackground(slider, percentage) {
            slider.style.background = `linear-gradient(to right, #3b82f6 0%, #3b82f6 ${percentage}%, #e2e8f0 ${percentage}%, #e2e8f0 100%)`;
        }

        // === EVENT LISTENERS ===

        // Chọn đề
        deSelector.addEventListener('change', (e) => {
            loadDe(e.target.value);
        });

 

        // Nút điều khiển
        btnPlay.addEventListener('click', togglePlay);
        btnNext.addEventListener('click', playNext);
        btnPrev.addEventListener('click', playPrev);

        // Nút Lặp lại
        btnRepeat.addEventListener('click', () => {
            isRepeatOne = !isRepeatOne;
            if (isRepeatOne) {
                btnRepeat.classList.remove('text-gray-400');
                btnRepeat.classList.add('text-blue-500');
                btnRepeat.innerHTML = '<i class="fa-solid fa-repeat"></i><span class="absolute text-[8px] font-bold mt-2 ml-1">1</span>'; // Thêm số 1 nhỏ
            } else {
                btnRepeat.classList.add('text-gray-400');
                btnRepeat.classList.remove('text-blue-500');
                btnRepeat.innerHTML = '<i class="fa-solid fa-repeat"></i>';
            }
        });

        // Nút Tốc độ (Speed)
        const speeds = [0.75, 1.0, 1.25, 1.5];
        btnSpeed.addEventListener('click', () => {
            let idx = speeds.indexOf(currentSpeed);
            idx = (idx + 1) % speeds.length;
            currentSpeed = speeds[idx];
            
            audioPlayer.playbackRate = currentSpeed;
            btnSpeed.textContent = currentSpeed + 'x';
            
            // Đổi màu nếu khác 1x để dễ nhận biết
            if(currentSpeed !== 1.0) btnSpeed.classList.add('text-blue-600');
            else btnSpeed.classList.remove('text-blue-600');
        });

        // Timeline Audio Events
        audioPlayer.addEventListener('timeupdate', () => {
            if (!isDraggingProgress && audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.value = percent;
                updateSliderBackground(progressBar, percent);
                timeCurrent.textContent = formatTime(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            timeTotal.textContent = formatTime(audioPlayer.duration);
            
            // Cập nhật lại thời lượng hiển thị trên danh sách nhạc
            if(currentTrackIndex !== -1) {
                const track = tracks[currentTrackIndex];
                track.duration = formatTime(audioPlayer.duration);
                const timeCell = document.getElementById(`timeDisplay_${currentTrackIndex}`);
                if(timeCell) timeCell.textContent = track.duration;
            }
        });

        audioPlayer.addEventListener('ended', () => {
            if (isRepeatOne) {
                // Lặp lại bài hiện tại nếu đang bật chế độ Repeat 1
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else {
                // Tự động nhảy bài nếu tắt Repeat
                playNext();
            }
        });

        // Xử lý báo lỗi khi file bị mất (Error Handler)
        audioPlayer.addEventListener('error', (e) => {
            console.warn("Lỗi tải file Audio. Chuyển bài tự động.", e);
            if(currentTrackIndex !== -1 && tracks[currentTrackIndex]) {
                 tracks[currentTrackIndex].status = 'error';
                 document.getElementById(`statusIcon_${currentTrackIndex}`).innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500" title="Lỗi/Không tìm thấy"></i>';
                 setTimeout(() => playNext(), 1000); // Đợi 1 giây rồi bỏ qua bài bị lỗi
            }
        });

        // Xử lý kéo Progress Bar
        progressBar.addEventListener('mousedown', () => isDraggingProgress = true);
        progressBar.addEventListener('touchstart', () => isDraggingProgress = true, {passive: true});
        
        progressBar.addEventListener('input', () => {
            updateSliderBackground(progressBar, progressBar.value);
            if (audioPlayer.duration) {
                timeCurrent.textContent = formatTime((progressBar.value / 100) * audioPlayer.duration);
            }
        });

        progressBar.addEventListener('change', () => {
            if (audioPlayer.duration) {
                audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration;
            }
            isDraggingProgress = false;
        });
        
        progressBar.addEventListener('mouseup', () => isDraggingProgress = false);
        progressBar.addEventListener('touchend', () => isDraggingProgress = false);

        // Xử lý kéo Volume Bar
        volumeBar.addEventListener('input', (e) => {
            const vol = parseFloat(e.target.value);
            audioPlayer.volume = vol;
            updateSliderBackground(volumeBar, vol * 100);
            
            const icon = volumeBar.previousElementSibling;
            if (vol === 0) icon.className = 'fa-solid fa-volume-xmark text-gray-500 text-sm';
            else if (vol < 0.5) icon.className = 'fa-solid fa-volume-low text-gray-500 text-sm';
            else icon.className = 'fa-solid fa-volume-high text-gray-500 text-sm';
        });

        // Điều khiển bằng Bàn phím
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                audioPlayer.currentTime += 5; // Tua tới 5s
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                audioPlayer.currentTime -= 5; // Tua lui 5s
            }
        });

        // Tích hợp Media Session API (Để điều khiển trên màn hình khóa điện thoại hoặc nút Play trên bàn phím laptop)
        function updateMediaSession() {
            if ('mediaSession' in navigator && currentTrackIndex !== -1) {
                const track = tracks[currentTrackIndex];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.fileName,
                    artist: `Đề số ${currentDe}`,
                    album: 'Luyện thi HSK',
                    artwork: [
                        { src: 'https://images.unsplash.com/photo-1546349864-16a76b107e3a?w=256&h=256&fit=crop', sizes: '256x256', type: 'image/jpeg' } // Placeholder Cover đẹp
                    ]
                });

                navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
                navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
                navigator.mediaSession.setActionHandler('previoustrack', playPrev);
                navigator.mediaSession.setActionHandler('nexttrack', playNext);
            }
        }

        // Toàn màn hình
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                btnFullscreen.innerHTML = '<i class="fa-solid fa-compress"></i>';
            } else {
                document.exitFullscreen();
                btnFullscreen.innerHTML = '<i class="fa-solid fa-expand"></i>';
            }
        });

        // Chạy khởi tạo
        init();

    </script>
</body>
</html>
