<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Audio Pro Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Custom Scrollbar cho phần danh sách */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Custom Timeline Slider */
        .progress-slider {
            -webkit-appearance: none; width: 100%; height: 4px; background: #e2e8f0;
            border-radius: 5px; outline: none; cursor: pointer; transition: background 450ms ease-in;
        }
        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 12px; height: 12px;
            border-radius: 50%; background: #2563eb; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        .progress-slider:hover::-webkit-slider-thumb { transform: scale(1.3); }
        
        /* Hiệu ứng Track đang phát */
        .playing-track { background-color: #eff6ff; border-radius: 0.5rem; }
        .playing-track .track-num { display: none; }
        .playing-track .track-eq { display: flex; }
        
        /* Equalizer Animation */
        .track-eq { display: none; align-items: flex-end; gap: 2px; height: 16px; justify-content: center;}
        .eq-bar { width: 3px; background-color: #2563eb; animation: eq-bounce 1s infinite ease-in-out; border-radius: 2px;}
        .eq-bar:nth-child(1) { animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { animation-delay: 0.0s; }
        @keyframes eq-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        .is-paused .eq-bar { animation-play-state: paused; height: 4px; }

        /* Disable pull-to-refresh on mobile */
        html, body { overscroll-behavior-y: none; }
    </style>
</head>
<!-- Sử dụng h-screen, flex-col và overflow-hidden để khóa khung hình -->
<body class="text-gray-800 h-screen w-screen flex flex-col overflow-hidden bg-white">

    <!-- ==================== HEADER (Cố định trên cùng) ==================== -->
    <header class="flex-none bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between z-30 relative shadow-sm h-[70px]">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md shadow-blue-500/20">
                <i class="fa-solid fa-headphones-simple text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">HSK Audio</h1>
            </div>
        </div>

        <!-- Bộ chọn Đề -->
        <div class="flex items-center">
            <select id="deSelector" class="bg-white border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block px-3 py-2 outline-none shadow-sm cursor-pointer font-medium hover:bg-gray-50 transition">
                <!-- Javascript render đề -->
            </select>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT (Khu vực cuộn ở giữa) ==================== -->
    <!-- flex-1 giúp khu vực này tự động co giãn lấp đầy khoảng trống, overflow-y-auto tạo thanh cuộn -->
    <main class="flex-1 overflow-y-auto custom-scrollbar bg-white relative w-full" id="mainScrollArea">
        <div class="max-w-4xl mx-auto px-2 sm:px-4 py-6">
            
            <!-- List Header (Sticky bám đỉnh khu vực cuộn) -->
            <div class="grid grid-cols-[40px_1fr_60px_40px] sm:grid-cols-[50px_1fr_80px_60px] gap-2 sm:gap-4 px-4 py-3 border-b border-gray-100 text-[11px] sm:text-xs font-semibold text-gray-400 uppercase tracking-wider sticky top-0 bg-white/95 backdrop-blur z-10">
                <div class="text-center">#</div>
                <div>Tệp</div>
                <div class="text-center"><i class="fa-regular fa-clock"></i></div>
                <div class="text-center">TT</div>
            </div>

            <!-- Track List Container -->
            <div id="trackList" class="flex flex-col mt-2">
                <!-- Tracks rendered by JS -->
            </div>

        </div>
    </main>

    <!-- ==================== PLAYER (Cố định dưới cùng) ==================== -->
    <!-- flex-none giữ chiều cao cố định, thay đổi responsive theo md: -->
    <footer class="flex-none bg-white border-t border-gray-100 px-4 py-3 sm:py-4 z-30 shadow-[0_-5px_20px_rgba(0,0,0,0.03)] w-full transition-all duration-300">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3 md:gap-6">
            
            <!-- 1. Info (Bên trái / Trên cùng ở Mobile) -->
            <div class="flex items-center gap-3 w-full md:w-1/3 min-w-0">
                <div id="nowPlayingIcon" class="w-12 h-12 rounded-lg bg-[#eef2ff] flex items-center justify-center flex-shrink-0 transition-colors">
                    <i class="fa-solid fa-compact-disc text-gray-400 text-xl"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <h4 id="nowPlayingTitle" class="font-bold text-gray-900 text-[15px] truncate">Chưa chọn bài</h4>
                    <p id="nowPlayingAlbum" class="text-xs text-gray-500 truncate mt-0.5">Vui lòng chọn bài</p>
                </div>
            </div>

            <!-- 2. Controls & Progress (Giữa) -->
            <div class="flex flex-col items-center w-full md:w-[40%] px-2">
                <!-- Buttons -->
                <div class="flex items-center justify-center gap-6 mb-2 sm:mb-3">
                    <button id="btnSpeed" class="text-xs font-bold text-gray-500 hover:text-blue-600 transition w-8 focus:outline-none">1.0x</button>
                    <button id="btnPrev" class="text-gray-600 hover:text-blue-600 transition text-lg focus:outline-none p-2"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="btnPlay" class="w-11 h-11 flex items-center justify-center bg-[#0f172a] text-white rounded-full hover:bg-blue-600 hover:scale-105 transition-all shadow-md focus:outline-none">
                        <i id="iconPlay" class="fa-solid fa-play ml-1 text-lg"></i>
                    </button>
                    <button id="btnNext" class="text-gray-600 hover:text-blue-600 transition text-lg focus:outline-none p-2"><i class="fa-solid fa-forward-step"></i></button>
                    <button id="btnRepeat" class="text-gray-400 hover:text-blue-600 transition text-sm focus:outline-none w-8 relative p-2" title="Lặp lại danh sách"><i class="fa-solid fa-repeat"></i></button>
                </div>
                
                <!-- Progress Bar -->
                <div class="w-full flex items-center gap-3">
                    <span id="timeCurrent" class="text-[10px] sm:text-[11px] font-medium text-gray-500 w-8 sm:w-10 text-right">0:00</span>
                    <input type="range" id="progressBar" class="progress-slider flex-1" min="0" max="100" value="0">
                    <span id="timeTotal" class="text-[10px] sm:text-[11px] font-medium text-gray-500 w-8 sm:w-10">0:00</span>
                </div>
            </div>

            <!-- 3. Volume (Bên phải / Ẩn trên Mobile) -->
            <div class="hidden md:flex items-center justify-end gap-3 w-1/3">
                <i class="fa-solid fa-volume-low text-gray-400 text-sm"></i>
                <input type="range" id="volumeBar" class="progress-slider w-24" min="0" max="1" step="0.01" value="1">
            </div>

        </div>
    </footer>

    <!-- Audio Element (Hidden) -->
    <audio id="audioPlayer"></audio>

    <script>
        // === CONFIGURATION ===
        const MAX_DE = 10;
        const TRACKS_PER_DE = 45;
        
        // === STATE ===
        let currentDe = 1;
        let currentTrackIndex = -1; 
        let isPlaying = false;
        let isRepeatOne = false;
        let currentSpeed = 1.0;
        let tracks = []; 
        let isDraggingProgress = false;

        // === DOM ELEMENTS ===
        const deSelector = document.getElementById('deSelector');
        const trackListContainer = document.getElementById('trackList');
        const audioPlayer = document.getElementById('audioPlayer');
        const btnPlay = document.getElementById('btnPlay');
        const iconPlay = document.getElementById('iconPlay');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnRepeat = document.getElementById('btnRepeat');
        const btnSpeed = document.getElementById('btnSpeed');
        const progressBar = document.getElementById('progressBar');
        const volumeBar = document.getElementById('volumeBar');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeTotal = document.getElementById('timeTotal');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingAlbum = document.getElementById('nowPlayingAlbum');
        const nowPlayingIcon = document.getElementById('nowPlayingIcon');

        function init() {
            for (let i = 1; i <= MAX_DE; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Đề số ${i}`;
                deSelector.appendChild(option);
            }
            loadDe(currentDe);
            updateSliderBackground(volumeBar, volumeBar.value * 100);
        }

        function padNum(num) {
            return String(num).padStart(3, '0');
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function loadDe(deNumber) {
            currentDe = parseInt(deNumber);
            
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            isPlaying = false;
            currentTrackIndex = -1;
            
            trackListContainer.innerHTML = '';
            tracks = [];

            for (let i = 1; i <= TRACKS_PER_DE; i++) {
                const trackNumStr = padNum(i);
                const fileName = `De${currentDe}_${trackNumStr}.mp3`;
                // Dummy path để giao diện test được (thay bằng path thực tế của bạn)
                const filePath = `data_HSKAudio/De${currentDe}_mp3/${fileName}`; 
                
                tracks.push({
                    index: i - 1,
                    num: i,
                    fileName: fileName,
                    path: filePath,
                    duration: '--:--', 
                    status: 'ready'
                });
            }

            renderTrackList();
            
            nowPlayingAlbum.textContent = `Đề số ${currentDe}`;
            nowPlayingTitle.textContent = "Chưa chọn bài";
            nowPlayingIcon.innerHTML = `<i class="fa-solid fa-compact-disc text-gray-400 text-xl"></i>`;
            timeCurrent.textContent = "0:00";
            timeTotal.textContent = "0:00";
            progressBar.value = 0;
            updateSliderBackground(progressBar, 0);
            updatePlayerUI();
        }

        function renderTrackList() {
            trackListContainer.innerHTML = '';
            
            tracks.forEach(track => {
                const row = document.createElement('div');
                row.id = `trackRow_${track.index}`;
                
                const isCurrentTrack = track.index === currentTrackIndex;
                let rowClasses = "grid grid-cols-[40px_1fr_60px_40px] sm:grid-cols-[50px_1fr_80px_60px] gap-2 sm:gap-4 px-4 py-3 items-center border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors group mx-1 my-0.5";
                
                if (isCurrentTrack) {
                    rowClasses += " playing-track border-transparent";
                    if (!isPlaying) rowClasses += " is-paused";
                }

                row.className = rowClasses;
                row.onclick = () => playTrack(track.index);

                row.innerHTML = `
                    <div class="text-center text-[13px] font-medium text-gray-400">
                        <span class="track-num group-hover:hidden ${isCurrentTrack ? 'hidden' : 'block'}">${track.num}</span>
                        <div class="track-eq group-hover:hidden w-full ${isCurrentTrack ? 'flex' : 'hidden'}">
                            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        </div>
                        <i class="fa-solid fa-play text-blue-500 hidden group-hover:block ${isCurrentTrack ? 'text-blue-600' : ''} text-xs"></i>
                    </div>
                    <div>
                        <div class="font-medium text-[14px] ${isCurrentTrack ? 'text-blue-600' : 'text-gray-700'}">${track.fileName}</div>
                    </div>
                    <div class="text-center text-[13px] font-medium text-gray-400 track-time" id="timeDisplay_${track.index}">${track.duration}</div>
                    <div class="text-center" id="statusIcon_${track.index}">
                        ${track.status === 'error' ? '<i class="fa-solid fa-triangle-exclamation text-red-400 text-xs"></i>' : ''}
                    </div>
                `;
                trackListContainer.appendChild(row);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= tracks.length) return;

            if (currentTrackIndex === index) {
                togglePlay();
                return;
            }

            currentTrackIndex = index;
            const track = tracks[currentTrackIndex];
            
            audioPlayer.src = track.path;
            audioPlayer.playbackRate = currentSpeed; 
            
            // Handle Play Promise
            audioPlayer.play().then(() => {
                isPlaying = true;
                track.status = 'playing';
                updatePlayerUI();
                renderTrackList(); 
                scrollToPlayingTrack();
            }).catch(error => {
                console.warn("Chưa có file audio thực tế:", error);
                // Giả lập giao diện chạy nếu file lỗi để test UI
                isPlaying = true;
                track.status = 'error';
                updatePlayerUI();
                renderTrackList();
                document.getElementById(`statusIcon_${currentTrackIndex}`).innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-400 text-xs"></i>';
            });
        }

        function togglePlay() {
            if (currentTrackIndex === -1) {
                playTrack(0);
                return;
            }
            if (audioPlayer.paused) {
                audioPlayer.play().catch(e => console.warn(e));
                isPlaying = true;
            } else {
                audioPlayer.pause();
                isPlaying = false;
            }
            updatePlayerUI();
            renderTrackList();
        }

        function playNext() {
            let nextIdx = currentTrackIndex + 1;
            if (nextIdx >= tracks.length) nextIdx = 0;
            playTrack(nextIdx);
        }

        function playPrev() {
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
                return;
            }
            let prevIdx = currentTrackIndex - 1;
            if (prevIdx < 0) prevIdx = tracks.length - 1;
            playTrack(prevIdx);
        }

        function scrollToPlayingTrack() {
            if (currentTrackIndex === -1) return;
            const row = document.getElementById(`trackRow_${currentTrackIndex}`);
            if (row) {
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function updatePlayerUI() {
            if (currentTrackIndex !== -1) {
                const track = tracks[currentTrackIndex];
                nowPlayingTitle.textContent = track.fileName;
                nowPlayingAlbum.textContent = `Đề số ${currentDe}`;
                
                if (isPlaying) {
                    nowPlayingIcon.innerHTML = `<i class="fa-solid fa-compact-disc fa-spin text-blue-500 text-2xl" style="animation-duration: 3s;"></i>`;
                    iconPlay.className = "fa-solid fa-pause text-lg";
                } else {
                    nowPlayingIcon.innerHTML = `<i class="fa-solid fa-compact-disc text-blue-500 text-2xl"></i>`;
                    iconPlay.className = "fa-solid fa-play ml-1 text-lg";
                }
            }
        }

        function updateSliderBackground(slider, percentage) {
            slider.style.background = `linear-gradient(to right, #2563eb 0%, #2563eb ${percentage}%, #e2e8f0 ${percentage}%, #e2e8f0 100%)`;
        }

        // === EVENT LISTENERS ===
        deSelector.addEventListener('change', (e) => loadDe(e.target.value));
        btnPlay.addEventListener('click', togglePlay);
        btnNext.addEventListener('click', playNext);
        btnPrev.addEventListener('click', playPrev);

        btnRepeat.addEventListener('click', () => {
            isRepeatOne = !isRepeatOne;
            if (isRepeatOne) {
                btnRepeat.classList.add('text-blue-600');
                btnRepeat.innerHTML = '<i class="fa-solid fa-repeat"></i><span class="absolute text-[8px] font-bold bottom-1 right-1 bg-white rounded-full leading-none">1</span>';
            } else {
                btnRepeat.classList.remove('text-blue-600');
                btnRepeat.innerHTML = '<i class="fa-solid fa-repeat"></i>';
            }
        });

        const speeds = [0.75, 1.0, 1.25, 1.5];
        btnSpeed.addEventListener('click', () => {
            let idx = speeds.indexOf(currentSpeed);
            idx = (idx + 1) % speeds.length;
            currentSpeed = speeds[idx];
            audioPlayer.playbackRate = currentSpeed;
            btnSpeed.textContent = currentSpeed + 'x';
            if(currentSpeed !== 1.0) btnSpeed.classList.add('text-blue-600');
            else btnSpeed.classList.remove('text-blue-600');
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (!isDraggingProgress && audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.value = percent;
                updateSliderBackground(progressBar, percent);
                timeCurrent.textContent = formatTime(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            timeTotal.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('ended', () => {
            if (isRepeatOne) {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else {
                playNext();
            }
        });

        progressBar.addEventListener('input', () => {
            isDraggingProgress = true;
            updateSliderBackground(progressBar, progressBar.value);
            if (audioPlayer.duration) {
                timeCurrent.textContent = formatTime((progressBar.value / 100) * audioPlayer.duration);
            }
        });

        progressBar.addEventListener('change', () => {
            if (audioPlayer.duration) {
                audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration;
            }
            isDraggingProgress = false;
        });

        volumeBar.addEventListener('input', (e) => {
            const vol = parseFloat(e.target.value);
            audioPlayer.volume = vol;
            updateSliderBackground(volumeBar, vol * 100);
            
            const icon = volumeBar.previousElementSibling;
            if (vol === 0) icon.className = 'fa-solid fa-volume-xmark text-gray-400 text-sm';
            else if (vol < 0.5) icon.className = 'fa-solid fa-volume-low text-gray-400 text-sm';
            else icon.className = 'fa-solid fa-volume-high text-gray-400 text-sm';
        });

        // Init
        init();
    </script>
</body>
</html>
